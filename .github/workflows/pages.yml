name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          AFA9AE: ${{ secrets.AFA9AE }}
          B330EC: ${{ secrets.B330EC }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AFA9AE', '')
          bm = os.environ.get('B330EC', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 40b49d46c10457fd8ea87cc292a95c4f9b0b389ad9 -->', gm)
              s2 = s2.replace('<!-- 59e3d77fd9b1888c6be2a3bc9a28d220cbe988b9 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
